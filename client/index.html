<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="minimal-ui, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Eat cells smaller than you and don't get eaten by the bigger ones, as an MMO">
    <meta name="robots" content="index, follow">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>BallGame</title>
    <link id="favicon" rel="icon" type="image/png" href="assets/img/favicon.png">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu:400,700" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css" crossorigin="anonymous">
    <link href="assets/css/index.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
    <script src="assets/js/log.js"></script>
    <script src="assets/js/vector.js"></script>
    <script src="assets/js/main_out.js?v=3"></script>
</head>
<body>

<!-- ═══════════════════════════════════════
     MAIN CANVAS (always present)
═══════════════════════════════════════ -->
<canvas id="canvas" width="800" height="600"></canvas>

<!-- ═══════════════════════════════════════
     MENU OVERLAY
═══════════════════════════════════════ -->
<div id="overlays">

    <!-- Modal backdrop -->
    <div class="modal-overlay" id="modal-overlay"></div>

    <!-- ── MAIN MENU PANEL ── -->
    <div id="helloDialog" class="panel">
        <h1 class="panel-title" id="title">BallGame</h1>
        <p class="panel-subtitle">Eat or be eaten.</p>

        <div class="form-row">
            <input id="nick" class="input-field save" data-box-id="0" placeholder="Enter nickname..." maxlength="15" autocomplete="off">
        </div>

        <div class="form-row server-row">
            <input id="server" class="input-field" data-box-id="1" placeholder="Server address...">
            <button id="connect" class="btn btn-secondary" onclick="setserver($('#server').val()); return false;">Connect</button>
        </div>

        <div class="form-row">
            <button type="submit" id="play-btn" onclick="setNick(document.getElementById('nick').value); return false;" class="btn btn-primary btn-needs-server">
                <i class="fas fa-play"></i> Play
            </button>
            <button onclick="$('#settings-panel').toggle(); return false;" class="btn btn-icon" id="settings-btn" title="Settings">
                <i class="fas fa-cog"></i>
            </button>
        </div>

        <div class="form-row">
            <a data-toggle="modal" data-target="#inPageModal" onclick="openSkinsList();" class="btn btn-outline" role="button" style="text-align:center;">
                <i class="fas fa-palette"></i> Skins Gallery
            </a>
        </div>

        <!-- ── SETTINGS PANEL (toggles) ── -->
        <div id="settings-panel" style="display:none;">
            <div class="settings-divider"><span>Settings</span></div>
            <div class="settings-grid">
                <label class="toggle-label">
                    <input type="checkbox" class="save" data-box-id="2" onchange="setSkins(!$(this).is(':checked'));"> No Skins
                </label>
                <label class="toggle-label">
                    <input type="checkbox" class="save" data-box-id="3" onchange="setNames(!$(this).is(':checked'));"> No Names
                </label>
                <label class="toggle-label">
                    <input type="checkbox" class="save" data-box-id="4" onchange="setDarkTheme($(this).is(':checked'));"> Dark Theme
                </label>
                <label class="toggle-label">
                    <input type="checkbox" class="save" data-box-id="5" onchange="setColors($(this).is(':checked'));"> No Colors
                </label>
                <label class="toggle-label">
                    <input type="checkbox" class="save" data-box-id="6" onchange="setShowMass($(this).is(':checked));"> Show Mass
                </label>
                <label class="toggle-label">
                    <input type="checkbox" class="save" data-box-id="7" onchange="setSmooth($(this).is(':checked));"> Smooth Render
                </label>
                <label class="toggle-label">
                    <input type="checkbox" class="save" data-box-id="8" onchange="setChatHide($(this).is(':checked));"> Hide Chat
                </label>
            </div>
            <div class="settings-divider"><span>Spectate</span></div>
            <button id="spectate-btn" onclick="spectate(); return false;" class="btn btn-warning btn-needs-server" style="width:100%;">
                <i class="fas fa-eye"></i> Spectate
            </button>
        </div>

        <!-- ── KEYBINDS ── -->
        <div class="keybinds-hint">
            <span><kbd>Space</kbd> Split</span>
            <span><kbd>W</kbd> Eject</span>
            <span><kbd>E</kbd> Recombine</span>
            <span><kbd>X</kbd> Virus</span>
            <span><kbd>3</kbd> Growth</span>
        </div>

        <div id="footer">BallGameClone</div>
    </div>

</div>

<!-- ═══════════════════════════════════════
     CONNECTING SCREEN
═══════════════════════════════════════ -->
<div id="connecting">
    <div class="connecting-box">
        <div class="spinner"></div>
        <h2>Connecting…</h2>
        <p>If this takes too long, check your connection or firewall.</p>
    </div>
</div>

<!-- ═══════════════════════════════════════
     GENERIC MODAL (skins gallery / errors)
═══════════════════════════════════════ -->
<div class="modal fade" id="inPageModal" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content dark-modal">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 id="inPageModalTitle" class="modal-title">Skins Gallery</h4>
            </div>
            <div id="inPageModalBody" class="modal-body">
                <p>Loading skins…</p>
                <div class="center"><div class="spinner"></div></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════
     IN-GAME SHORTCUT BAR (top-left)
═══════════════════════════════════════ -->
<div id="hud-menu-bar">
    <button class="hud-btn" onclick="$('#overlays').show();" title="Menu">
        <i class="fas fa-bars"></i>
    </button>
</div>

<!-- ═══════════════════════════════════════
     CHAT
═══════════════════════════════════════ -->
<input type="text" id="chat_textbox" placeholder="Press Enter to chat…" maxlength="200" autocomplete="off">

<!-- ═══════════════════════════════════════
     INVENTORY HUD  (simple HTML, no canvas)
═══════════════════════════════════════ -->
<div id="inventory">
    <div class="inv-slot" id="inv-slot-growth" title="Growth (press 3)">
        <span class="slot-key">3</span>
        <span class="slot-icon">🌱</span>
        <span class="slot-label">Growth</span>
    </div>
</div>

<!-- font preload trick -->
<div style="font-family:'Ubuntu'">&nbsp;</div>

<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/js/bootstrap.min.js"></script>
</body>
</html>
